<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LyricWrite</title>

    <script src="./index.js" defer type="module"></script>

    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="pageEnter">
        <div class="header">
            <h2 id="pageTitle">LyricWrite</h2>
            <hr>
        </div>
        <div class="card">
            <div style="display: flex; flex-direction: row;">
                <h2 id="sectionTitle">Songs</h2>
                <button id="addSong">Add Song</button>
            </div>

            <ul class="sortable-list">
                <template id="songBtnTemplate">
                    <li class="sortable-item" draggable="true">
                        <div>
                            <div class="editable-container" id="titleContainer">
                                <span class="editable-text" id="songTitle"></span>

                                <input type="text" class="editable-input" id="songInput" value="">
                            </div>
                            <button class="loadBtn">Work on song</button>
                        </div>
                    </li>
                </template>
            </ul>

        </div>
    </div>
    <div id="songEdit" hidden>
        <div class="header">
            <button id="goBackToMainPage">Back</button>
            <h2 class="pageTitle"></h2>
            <hr>
        </div>
        <div id="songPartsHolder">
            <template id="templateSongPart">
                <div class="card song-part">
                    <div class="part-header"
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                        <select class="part-type-select">
                            <option value="Verse">Verse</option>
                            <option value="Chorus">Chorus</option>
                            <option value="Bridge">Bridge</option>
                            <option value="Intro">Intro</option>
                            <option value="Outro">Outro</option>
                        </select>
                        <button class="delete-part-btn">Delete</button>
                    </div>
                    <textarea class="part-lyrics-textarea" rows="5" placeholder="Type lyrics here..."></textarea>
                </div>
            </template>
        </div>
    </div>
</body>

</html>
