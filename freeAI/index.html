<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <meta name="color-scheme" content="light dark">
    <link rel="icon" type="image/x-icon" href="freeAILogo.svg">

    <style>
        #mainChat {
            overflow-y: scroll;
        }

        #title {
            display: flex;
            justify-content: center;
        }
    </style>
    <title>AI on a Student Budget</title>
</head>

<body>
    <header>
        <h1 id="title">AI on a Student Budget</h1>
        <hr />
    </header>
<h1 id="mainMessage"> Login to contenue</h1>
    <button id="login">Login</button>
</body>
<script type="module">
    import * as FirebaseUtils from './firebaseUtils.js';
    const text = document.getElementById("mainMessage")

    document.getElementById("login").addEventListener("click", async () => {
        const data = await FirebaseUtils.loginGoogle()
        console.log(data.user.uid)
       const userData = await FirebaseUtils.getDocument("/system/allowedUsers")
       console.log(userData)
       if(userData === undefined){
        FirebaseUtils.setDocument("/system/allowedUsers", {users: [data.user.uid]})
       }
       if(userData.users.includes(data.user.uid)){
        window.location.href = "https://codeknight1119.github.io/freeAI/chat.html"
       }else{
        text.innerText = "You are not allowed to acess this content."
       }
    })

</script>

</html>
