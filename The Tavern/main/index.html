<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Tavern</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/rpg-awesome/0.2.0/css/rpg-awesome.min.css">
    <link rel="stylesheet" href="./style.css">
    <script type="module" src="./app.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght=400..900&display=swap" rel="stylesheet">
</head>

<body>
    <nav id="sidebar">
        <ul>
            <li>
                <button id="toggle-btn">
                    <i class="ra ra-broadhead-arrow"></i>
                </button>
            </li>
        </ul>
        <ul id="everySidebarParent">
            <template id="sidebarTemplate">
                <li class="active">
                    <a class="nav-btn">
                        <i class="ra ra-2x"></i>
                        <span class="sidebarText">Bulletin</span>
                    </a>
                </li>
            </template>

            <li>
                <button class="dropdown-btn">
                    <i class="ra ra-2x ra-player"></i>
                    <span>Your Stuff</span>
                    <i class="ra ra-broadhead-arrow"></i>
                </button>
                <div class="sub-menu">
                    <ul>
                        <li>
                            <a>Campaign</a>
                        </li>
                    </ul>
                </div>
            </li>
        </ul>
    </nav>
    <main>
        <header>
            <h1 class="cinzel-title">The Tavern</h1>
        </header>
    </main>
</body>

</html>
