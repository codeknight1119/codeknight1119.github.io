<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <meta name="color-scheme" content="light dark">
    <link rel="icon" type="image/x-icon" href="../freeAILogo.svg">

    <style>
        #mainChat {
            overflow-y: scroll;
            margin-bottom: 20px;
            max-height: 60vh;
        }

        #title {
            display: flex;
            justify-content: center;
        }

        #sendMessageUI {
            display: flex;
            flex-direction: row;
            gap: 10px;
        }

        /* Sidebar container styling */
        .sidebar {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 2;
            /* Put above main content */
            top: 0;
            left: 0;
            background-color: #111;
            overflow-x: hidden;
            padding-top: 60px;
            transition: 0.5s;
        }

        /* Sidebar links & conversation items */
        .sidebar a {
            padding: 8px 8px 8px 32px;
            text-decoration: none;
            font-size: 18px;
            color: #818181;
            display: block;
            transition: 0.3s;
        }

        .sidebar a.active {
            padding: 8px 8px 8px 32px;
            text-decoration: none;
            font-size: 18px;
            color: #000000;
            display: block;
            transition: 0.3s;
            background-color: white;
            border-radius: 8px;
        }

        .sidebar a:hover {
            color: #f1f1f1;
        }

        /* Position and style the close button */
        .sidebar .closebtn {
            position: absolute;
            top: 0;
            right: 25px;
            font-size: 36px;
            margin-left: 50px;
        }

        /* New Conversation Button Styling */
        .new-conv-btn {
            margin: 0 20px 20px 32px;
            width: calc(100% - 52px);
            background-color: #232323;
            border: 1px solid #444;
            color: #fff;
            padding: 8px;
            font-size: 14px;
            cursor: pointer;
        }

        .new-conv-btn:hover {
            background-color: #333;
        }

        #main {
            transition: margin-left .5s;
            padding: 20px;
        }

        @media screen and (max-height: 450px) {
            .sidebar {
                padding-top: 15px;
            }

            .sidebar a {
                font-size: 16px;
            }
        }

        #openBttn {
            font-size: 50px;
            background: none;
            border: none;
            cursor: pointer;
            /* padding: 10px;*/
            color: inherit;
        }
    </style>
    <title>AI on a Student Budget</title>
</head>

<body>
    <header>
        <button id="openBttn">&#9776;</button>
        <h1 id="title">AI on a Student Budget</h1>
        <hr />
    </header>


    <main class="container">
        <div id="main">
            <div id="sideBar" class="sidebar">
                <a href="javascript:void(0)" id="closeBttn" class="closebtn">&times;</a>
                <button id="logout" style="margin-top: 20px;" class="new-conv-btn">Logout</button>
                <hr style="border-color: #222; margin: 0 0 15px 0;" />
                <button id="newConvBttn" class="new-conv-btn">+ New Conversation</button>
                <hr style="border-color: #222; margin: 0 0 15px 0;" />
                <div id="conversationsList"></div>
            </div>



            <div id="mainChat">

                <template id="messageTemplate">
                    <div class="messageContent">
                    </div>
                    <div class="actions"><button class="copy secondary" style="scale:50%">Copy</button></div>
                    <hr style="border-color: #222; margin: 0 0 15px 0;" />
                </template>
            </div>

            <div id="UIBar">
                <div id="sendMessageUI">
                    <textarea id="textEnter" placeholder="Type a message..."></textarea>
                    <button id="sendButton">Send</button>
                </div>
                <details name="systemPrompt">
                    <summary>System Prompt</summary>
                    <textArea id="currentSysPrompt"></textArea>
                    <button id="saveCurrentSysPrompt">Save</button>
                </details>
            </div>
        </div>
    </main>

</body>

<script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
<script type="module">
    import * as FirebaseUtils from '../firebaseUtils.js';

    // Global accessibility adjustments
    window.openNav = openNav;
    window.closeNav = closeNav;
    window.createNewConversation = createNewConversation;

    document.getElementById("openBttn").addEventListener("click", openNav);
    document.getElementById("closeBttn").addEventListener("click", closeNav);
    document.getElementById("newConvBttn").addEventListener("click", createNewConversation);

    // Variables section
    let defaultSysPrompt = "You are an AI to help a user with daily tasks."
    let sysPrompt = "";
    let isReady = false;
    let currentConversationId = null;
    let messages = [];
    let convs = new Map();

    async function init() {
        const data = await FirebaseUtils.isSignedIn();

        if (!data) {
            window.location.href = "https://codeknight1119.github.io/freeAI/s3";
            return;
        }

        const allowedUsers = await FirebaseUtils.getDocument("/system/allowedUsers");

        if (!allowedUsers || !allowedUsers.users.includes(data.uid)) {
            window.location.href = "https://codeknight1119.github.io/freeAI/s3";
        }
    }
    init();

    const textIn = document.getElementById("textEnter");
    let shiftDown = false;
    textIn.addEventListener("keydown", (event) => {
        if (event.code === "Enter" && !event.shiftKey) {
            event.preventDefault()

            queryModel()
        }
    })


    const messageArea = document.getElementById("mainChat");
    document.getElementById("sendButton").addEventListener("click", queryModel);


    async function getConversations() {
        const convData = await FirebaseUtils.getDocuments("/conversations", 15, { field: "timestamp", direction: "desc" });
        const container = document.getElementById("conversationsList");
        container.innerHTML = "";

        if (convData && convData.length !== 0) {
            convData.forEach((val) => {
                convs.set(val.id, val);

                let convLink = document.createElement("a");
                convLink.href = "javascript:void(0)";
                convLink.innerText = val.title || "Chat " + val.id.substring(0, 6);

                convLink.id = val.id

                convLink.onclick = () => loadConversation(val);

                container.appendChild(convLink);
            });
        } else {
            let emptyNotice = document.createElement("p");
            emptyNotice.style = "color: #555; padding-left: 32px; font-size: 14px;";
            emptyNotice.innerText = "No conversations, try making one!";
            container.appendChild(emptyNotice);
        }
        getLastConv()
    }

    function getLastConv() {
        const lastConvId = localStorage.getItem("lastConv");
        if (lastConvId && convs.has(lastConvId)) {
            loadConversation(convs.get(lastConvId));
        }
        isReady = true;
    }

    getConversations();

    async function queryModel() {
        if (!isReady) {
            setTimeout(queryModel, 500);
            return;
        }
        try {
            const query = textIn.value;
            if (!query.trim()) return;

            if (currentConversationId === null) {
                const newConv = await FirebaseUtils.addDocument("/conversations", { title: "Generating title...", timestamp: new Date().getTime() });
                currentConversationId = newConv.id;

                setUpConv(currentConversationId, query);
            }

            textIn.value = "";
            renderMessage("user", query)

            const userMessage = { "role": "user", "content": query, "timestamp": Date.now() };
            messages.push(userMessage);
            await FirebaseUtils.addDocument(`conversations/${currentConversationId}/messages`, userMessage);

            const receive = await queryGas({ messages: messages });
            const receivedMessage = receive.choices[0].message.content;


            renderMessage("model", receivedMessage)

            const aiMessage = { "role": "assistant", "content": receivedMessage, "timestamp": Date.now() }
            messages.push(aiMessage);
            await FirebaseUtils.addDocument(`conversations/${currentConversationId}/messages`, aiMessage);

            // Auto-scroll chat area
            messageArea.scrollTop = messageArea.scrollHeight;
        } catch (e) {
            console.error(e);
        }
    }

    const msgTemplate = document.getElementById("messageTemplate")
    function renderMessage(sender, content) {
        const clone = msgTemplate.content.cloneNode(true);
        const messageMark = marked.parse(`**${sender.toUpperCase()}:** ` + content);
        clone.querySelector(".messageContent").innerHTML = messageMark
        messageArea.scrollTop = messageArea.scrollHeight;
        const copyBtn = clone.querySelector('.copy');
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(messageMark)
                .then(() => {
                    copyBtn.textContent = 'Copied!';
                    copyBtn.classList.add('copied');
                    setTimeout(() => {
                        copyBtn.textContent = 'Copy';
                        copyBtn.classList.remove('copied');
                    }, 2000);
                })
                .catch(err => {
                    console.error('Could not copy text: ', err);
                });
        });
        messageArea.appendChild(clone)
    }

    function openNav() {
        document.getElementById("sideBar").style.width = "250px";
        document.getElementById("main").style.marginLeft = "250px";
    }

    function closeNav() {
        document.getElementById("sideBar").style.width = "0";
        document.getElementById("main").style.marginLeft = "0";
    }

    function createNewConversation() {
        messageArea.innerHTML = "";
        sysPrompt = defaultSysPrompt
        document.getElementById("currentSysPrompt").value = sysPrompt
        messages = [{ "role": "system", "content": sysPrompt }];
        currentConversationId = null; // Clean slate state

        closeNav();
    }

    async function loadConversation(conv) {
        const id = conv.id
        localStorage.setItem("lastConv", id)
        messageArea.innerHTML = "<p>Loading history...</p>";
        closeNav();

        currentConversationId = id;
        let systemPrompt = sysPrompt = conv.sysPrompt

        if (!systemPrompt) {
            sysPrompt = systemPrompt = defaultSysPrompt;
            FirebaseUtils.updateDocument(`conversations/${id}`, { sysPrompt: sysPrompt })
        }
        messages = [{ "role": "system", "content": systemPrompt }];
        document.getElementById("currentSysPrompt").value = systemPrompt

        try {
            let mapData = convs.get(id)
            let history;
            if (mapData.messages) {
                history = mapData.messages
            } else {
                history = await FirebaseUtils.getDocuments(`conversations/${id}/messages`, 50, { field: "timestamp", direction: "asc" });
                mapData.messages = history
            }
            //  history = history.toReversed()
            messageArea.innerHTML = "";

            if (history && history.length > 0) {
                history.forEach((msg) => {
                    messages.push({ role: msg.role, content: msg.content });
                    renderMessage(msg.role, msg.content)
                });
                messageArea.scrollTop = messageArea.scrollHeight;
            }
        } catch (e) {
            console.error("Error reading chat history: ", e);
            messageArea.innerHTML = "<p>Could not load history.</p>";
        }


        const container = document.getElementById("conversationsList");

        Array.from(container.children).forEach((val) => {
            val.classList.remove('active');
        });

        document.getElementById(id).classList.add("active");
    }

    async function setUpConv(id, firstPromptText) {
        try {
            const params = [
                { "role": "system", "content": "Create a name for this conversation based on the message from the user. Keep the name under 10 words." },
                { "role": "user", "content": firstPromptText }
            ];

            const data = await queryGas({ "messages": params });
            const titleText = data.choices[0].message.content;

            await FirebaseUtils.updateDocument(`/conversations/${id}`, { title: titleText });
            const convData = convs.get(id)
            if (!convData) {
                convData.set(id, { title: titleText })
            } else {
                convData.title = titleText;
            }
            getConversations();

        } catch (err) {
            console.error("Failed to generate custom title summary: ", err);
        }
    }

    async function queryGas(body) {
        const GAS_LINK = "https://script.google.com/macros/s/AKfycby0zI4tnKuw9Occx_mPQu6DLINgYVvf_EKuffDeI6HNFdZCxI2BXReMhH1Zg8RdK_r-Qw/exec"
        const data = await fetch(GAS_LINK, {
            method: "POST",
            body: JSON.stringify(body),
        });
        const receive = await data.json();
        if (receive.choices[0].message.toolsUsed) {
            const toolsUsed = receive.choices[0].message.toolsUsed
            toolsUsed.forEach((toolCall)=>{
                messages.push({ role: "tool", content: toolCall})
            })
            console.log(messages)
        }
        //   console.log(receive)
        return receive;
    }

    document.getElementById("logout").addEventListener("click", () => {
        FirebaseUtils.logout()
        window.location.href = "https://codeknight1119.github.io/freeAI/s3";
    })

    const saveButton = document.getElementById("saveCurrentSysPrompt")
    saveButton.addEventListener("click", async () => {
        const newSysPrompt = document.getElementById("currentSysPrompt").value;

        // 1. Update the global system prompt variable
        sysPrompt = newSysPrompt;

        // 2. Update the active messages array so the AI actually uses it on the next send
        const activeSysMessage = messages.find(item => item.role === "system");
        if (activeSysMessage) {
            activeSysMessage.content = newSysPrompt;
        } else {
            messages.unshift({ role: "system", content: newSysPrompt });
        }

        // 3. Only update Firebase if the conversation has actually been created
        if (currentConversationId) {
            // Use updateDocument to prevent overwriting the title/timestamp
            await FirebaseUtils.updateDocument(`/conversations/${currentConversationId}`, { sysPrompt: newSysPrompt });

            // Safely update the local cache if it exists
            const currentConvData = convs.get(currentConversationId);
            if (currentConvData) {
                currentConvData.sysPrompt = newSysPrompt;
                if (currentConvData.messages) {
                    const systemDoc = currentConvData.messages.find(item => item.role === "system");
                    if (systemDoc) systemDoc.content = newSysPrompt;
                }
            }
        }

        // UI Feedback
        saveButton.innerText = "Saved!";
        setTimeout(() => {
            saveButton.innerText = "Save";
        }, 1000);
    });
</script>

</html>
