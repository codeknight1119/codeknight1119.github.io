<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Tavern</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/rpg-awesome/0.2.0/css/rpg-awesome.min.css">
    <link rel="stylesheet" href="./style.css">
    <script type="module" src="./app.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght=400..900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
</head>

<body>
    <nav id="sidebar">
        <ul>
            <li>
                <button id="toggle-btn">
                    <i class="ra ra-broadhead-arrow"></i>
                </button>
            </li>
        </ul>
        <ul>
            <template id="sidebarTemplate">
                <li>
                    <a class="nav-btn">
                        <i class="ra ra-2x"></i>
                        <span class="sidebarText"></span>
                    </a>
                </li>
            </template>

            <li>
                <button class="dropdown-btn">
                    <i class="ra ra-2x ra-beer"></i>
                    <span>Everyone</span>
                    <i class="ra ra-broadhead-arrow"></i>
                </button>
                <div class="sub-menu">
                    <ul id="everySidebarParent">
                    </ul>
                </div>
            </li>

            <li>
                <button class="dropdown-btn">
                    <i class="ra ra-2x ra-player"></i>
                    <span>Your Stuff</span>
                    <i class="ra ra-broadhead-arrow"></i>
                </button>
                <div class="sub-menu">
                    <ul>
                        <li>
                            <a>Campaign</a>
                        </li>
                    </ul>
                </div>
            </li>
        </ul>
    </nav>
    <main>
        <header>
            <h1 class="cinzel-title">The Tavern</h1>
        </header>
        <div id="mainContentArea">


        </div>
        <div id="chatTools" hidden class="featureHTML">
            <div id="sendBar"></div><button id="sendBtn"><i class="ra ra-2x ra-spear-head"></i></button>
        </div>
        <div id="boardCreation" hidden class="featureHTML">
            <input type="text" id="boardTitle" placeholder="titleText" class="cinzel-title"></input>
            <div id="mainBody"></div>
        </div>
        <div id="userPermsUI" hidden class="featureHTML">
            <p id="helpTextUserPerms"><strong>Select a filter or enter a search and press the find button to
                    begin</strong></p>
            <div id="userSearchFilters">
                <label for="filterDropdown">Choose a filter</label>
                <select name="filterDropdown" id="filterDropdown">
                    <option value="searchName">Search by name</option>
                    <option value="notAllowed">Not allowed users (recent signups)</option>
                </select>

            </div>
            <button id="userSearchBttn">Find Users</button>
            <input type="text" id="searchTermIn" />
            <template id="userSearchTemplate">
                <div style="display: inline-block;">
                    <span>Name</span>
                    <p class="searched-Name"></p>
                    <p>|</p><span>Roles</span></spam>
                    <div class="searched-roles"></div>
                </div>
            </template>
        </div>
        <template id="board:template">
            <div>
                <section class='boardMessage'>
                    <h3 class="cinzel-title board-title"></h3>
                    <p class="board-body"></p>
                    <button class="board-delete" hidden>Delete</button>
                </section>
            </div>
        </template>
        <button id="board:new" hidden>Create a new board.</button>

    </main>
</body>

</html>
