<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LyricWrite</title>

    <script src="./index.js" defer type="module"></script>

    <link rel="stylesheet" href="./style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>

<body>
    <button id="saveEditsButton">Save (saved)</button>
    <div class="pageEnter">
        <div class="header">
            <h2 id="pageTitle">LyricWrite</h2>
            <hr>
        </div>
        <div class="card">
            <div style="display: flex; flex-direction: row;">
                <h2 id="sectionTitle">Songs</h2>
                <button id="addSong">Add Song</button>
            </div>

            <ul class="sortable-list">
                <template id="songBtnTemplate">
                    <li class="sortable-item" draggable="true">
                        <div class="editable-container" id="titleContainer">
                            <span class="editable-text" id="songTitle" style="font-size: 30px;"></span>

                            <input type="text" class="editable-input" id="songInput" value="">
                        </div>
                        <button class="loadBtn">Work on song</button>
                    </li>
                </template>
            </ul>

        </div>
        <div class="card">
            <div style="display: flex; flex-direction: row;">
                <h2 id="sectionTitle">Ideas</h2>
            </div>
            <div id="createIdea">
                <button id="addIdea">Add Idea</button>
            </div>
            <div id="existingIdeas">
                <template id="templateIdea">
                    <div class="card ideaParent">
                        <textarea class="writeLyrics ideaChild">

                        </textarea>
                    </div>
                </template>
            </div>
        </div>
    </div>
    <div id="songEdit" hidden>
        <div class="header">
            <h2 class="pageTitle" id="editTitle"></h2>
            <button id="backToMainPage">Back</button>
            <button id="copySong">Copy</button>
            <hr>
        </div>
        <div id="createSongPart">
            <div class="notesArea card">
                <div class="songPartTitle">Notes</div>
                <textArea id="notesArea" class="writeLyrics"></textArea>
            </div>
            <br>
            <hr>
            <br>
            <label for="createSongPart">Choose Song Part Type</label>
            <select name="createSongPart" id="createSongPartDropdown">
                <option value="intro">Intro</option>
                <option value="verse" selected>Verse</option>
                <option value="pre-chorus">Pre-Chorus</option>
                <option value="chorus">Chorus</option>
                <option value="post-chorus">Post-Chorus</option>
                <option value="bridge">Bridge</option>
                <option value="instrumental">Instrumental</option>
                <option value="outro">Outro</option>
            </select>
            <button id="createSongPartBtn">Create</button>
        </div>
        <br>
        <hr>
        <br>
        <ul id="songPartsHolder" class="sortable-list">

        </ul>

    </div>
    <template id="templateSongPart">
         <li class="sortable-item" draggable="true">
            <div class="card songPart">
                <div style="display: flex; flex-direction: row;">
                    <button class="deleteSongPart">X</button> <div class="songPartTitle"></div>
               </div>
                <textarea class="writeLyrics"></textarea>
            </div>
        </li>
    </template>

</body>

</html>
