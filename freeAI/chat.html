<!doctype html>
<html lang="en">


<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <meta name="color-scheme" content="light dark">
    <link rel="icon" type="image/x-icon" href="freeAILogo.svg">


    <style>
        #mainChat {
            overflow-y: scroll;
        }


        #title {
            display: flex;
            justify-content: center;
        }


        #sendMessageUI {
            display: flex;
            flex-direction: row;
            gap: 10px;
        }

        /*Giving credit where credit is due, thanks W3!*/
        .sidebar {
            height: 100%;
            /* 100% Full-height */
            width: 0;
            /* 0 width - change this with JavaScript */
            position: fixed;
            /* Stay in place */
            z-index: 1;
            /* Stay on top */
            top: 0;
            left: 0;
            background-color: #111;
            /* Black*/
            overflow-x: hidden;
            /* Disable horizontal scroll */
            padding-top: 60px;
            /* Place content 60px from the top */
            transition: 0.5s;
            /* 0.5 second transition effect to slide in the sidebar */
        }

        /* The sidebar links */
        .sidebar a {
            padding: 8px 8px 8px 32px;
            text-decoration: none;
            font-size: 25px;
            color: #818181;
            display: block;
            transition: 0.3s;
        }

        /* When you mouse over the navigation links, change their color */
        .sidebar a:hover {
            color: #f1f1f1;
        }

        /* Position and style the close button (top right corner) */
        .sidebar .closebtn {
            position: absolute;
            top: 0;
            right: 25px;
            font-size: 36px;
            margin-left: 50px;
        }



        /* Style page content - use this if you want to push the page content to the right when you open the side navigation */
        #main {
            transition: margin-left .5s;
            /* If you want a transition effect */
            padding: 20px;
        }

        /* On smaller screens, where height is less than 450px, change the style of the sidenav (less padding and a smaller font size) */
        @media screen and (max-height: 450px) {
            .sidebar {
                padding-top: 15px;
            }

            .sidebar a {
                font-size: 18px;
            }
        }

        #openBttn {
            position: absolute;
            top: 10;
            left: 10;
        }
    </style>
    <title>AI on a Student Budget</title>
</head>


<body>
    <header>
        <h1 id="title">AI on a Student Budget</h1>
        <hr />
    </header>
    <main class="container">
         <button id="login">Login</button>
        <div id="main">
            <button onclick="openNav()">&#9776;</button>
            <div class="sidebar">
                <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
                <button class="new-conv-btn" onclick="createNewConversation()">+ New Conversation</button>
                <hr style="border-color: #222; margin: 0 0 15px 0;" />
                <div id="conversationsList">

                </div>
            </div>
            <div id="mainChat">
            </div>
            <div id="UIBar">
                <div id="sendMessageUI">
                    <button id="sendButton">Send</button>
                    <input id="textEnter" />
                </div>
            </div>
    </main>
</body>
<script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
<script type="module">
    import * as FirebaseUtils from './firebaseUtils.js';



    async function init() {
        const data = await FirebaseUtils.isSignedIn()

        // 1. If the user isn't signed in at all, send them back to login
        if (!data) {
            window.location.href = "https://codeknight1119.github.io/freeAI/"
            return; // Stop execution here
        }

        // 2. Fetch the allowed users list
        const allowedUsers = await FirebaseUtils.getDocument("/system/allowedUsers")

        // 3. Fix the variable name here (changed userData to allowedUsers)
        if (!allowedUsers || !allowedUsers.users.includes(data.uid)) {
            window.location.href = "https://codeknight1119.github.io/freeAI/"
        }
    }
    init()


    let convs = new Map()

    async function getConversations() {
        const convData = await FirebaseUtils.getDocuments("/conversations", 15, { field: "timestamp", direction: "desc" })
        if (convData.length !== 0) {

        } else {

        }
    }
    getConversations()



    const textIn = document.getElementById("textEnter")
    const messageArea = document.getElementById("mainChat")
    document.getElementById("sendButton").addEventListener("click", queryModel)


    let sysPrompt = ""
    let isReady = false;
    async function getSysPrompt() {
        try {
            const data = await FirebaseUtils.getDocument("/system/systemPrompt");
            sysPrompt = data.prompt || "You are an AI to help a user with daily tasks.";
        } catch (e) {
            sysPrompt = "You are an AI to help a user with daily tasks.";
            await FirebaseUtils.setDoc("/system/systemPrompt", { prompt: sysPrompt });
        }
        messages.push({ "role": "system", "content": sysPrompt });
        getMessages()
    }






    let messages = []
    async function getMessages() {
        //under collection messages with a limit of 50
        const messageData = await FirebaseUtils.getDocuments("/messages", 50)
        if (messageData && messageData.length !== 0) {
            messageData.forEach((val) => {
                messages.push(val)
                let messageElement = document.createElement("p")
                messageElement.innerHTML = marked.parse(`**${(val.role).toUpperCase()}:** ` + val.content)
                messageArea.appendChild(messageElement)
            })
        }
        isReady = true
    }


    getSysPrompt()



    async function queryModel() {
        if (!isReady) {
            setTimeout(queryModel, 500)
            return
        }
        try {
            const query = textIn.value
            textIn.value = ""
            let userMessageElement = document.createElement("p")
            userMessageElement.innerHTML = "<strong>USER:</strong> " + query
            messageArea.appendChild(userMessageElement)
            const userMessage = { "role": "user", "content": query }
            messages.push(userMessage)
            FirebaseUtils.addDocument("/messages/", userMessage)




            const GAS_LINK = "https://script.google.com/macros/s/AKfycbxkvaF-sl0n20SOZFIWw8vsutZBo-DLKOmdFiLC_O5J7Tt0Xjs0xLwWxI_N4XsTuId6/exec"
            const data = await fetch(GAS_LINK, {
                method: "POST",
                body: JSON.stringify({ "messages": messages }),


            })
            const recive = await data.json()
            console.log("Raw Output: ", recive)
            const recivedMessage = recive.choices[0].message.content


            let aiMessageElement = document.createElement("p")
            aiMessageElement.innerHTML = marked.parse("**MODEL:** " + recivedMessage)
            const aiMessage = { "role": "assistant", "content": recivedMessage }
            messages.push(aiMessage)
            FirebaseUtils.addDocument("/messages/", aiMessage)
            messageArea.appendChild(aiMessageElement)
        } catch (e) {
            console.error(e)
        }
    }

    function openNav() {
        document.getElementById("sidebar").style.width = "250px";
        document.getElementById("main").style.marginLeft = "250px";
    }

    /* Set the width of the sidebar to 0 and the left margin of the page content to 0 */
    function closeNav() {
        document.getElementById("sidebar").style.width = "0";
        document.getElementById("main").style.marginLeft = "0";
    }

</script>


</html>
