<!DOCTYPE html>

<head>
    <title>Light Show</title>
    <style>
        #colorsHolder {
            display: flex;
            justify-content: space-evenly;
            gap: 10px;
        }
    </style>
</head>


<body>
    <button id="login">Login With Spoify</button>



    <img id="albumArt" crossorigin="anonymous" />
    <div id="title"></div>
    <div id="artist"></div>
    <div id="colorsHolder">

    </div>
    <template id="colorTemplate">
        <div class="color-swatch" style="width: 100px; height: 100px;"></div>
    </template>
</body>
<script type="module">
    import { Vibrant } from 'https://esm.sh/node-vibrant@4.0.4/browser';
    let token = null;

    const saved =
        localStorage.getItem("spotify_token");



    const CLIENT_ID = "464165c812254a8b92210b46a9c55282";

    const REDIRECT_URI =
        "https://codeknight1119.github.io/lightShow/";

    const SCOPES = [
        "user-read-playback-state"
    ].join(" ");

    function generateRandomString(length) {
        const chars =
            "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";

        let result = "";

        for (let i = 0; i < length; i++) {
            result += chars.charAt(
                Math.floor(Math.random() * chars.length)
            );
        }

        return result;
    }



    async function sha256(plain) {
        const encoder = new TextEncoder();
        const data = encoder.encode(plain);

        return await crypto.subtle.digest("SHA-256", data);
    }

    function base64url(buffer) {
        return btoa(String.fromCharCode(...new Uint8Array(buffer)))
            .replace(/\+/g, "-")
            .replace(/\//g, "_")
            .replace(/=+$/, "");
    }


    async function fetchWebApi(endpoint, method = "GET", body = null) {

        const options = {
            method,
            headers: {
                Authorization: `Bearer ${token.access_token}`
            }
        };

        if (body !== null) {
            options.headers["Content-Type"] = "application/json";
            options.body = JSON.stringify(body);
        }

        const res = await fetch(
            `https://api.spotify.com/${endpoint}`,
            options
        );


        if (res.status === 204) {
            return null;
        }

        if (res.status === 401) {
            await refreshAccessToken()
            return fetchWebApi(endpoint, method, body);
        }

        if (!res.ok) {
            const error = await res.json();
            console.error(error);
            throw new Error(error.error?.message || `HTTP ${res.status}`);
        }

        return await res.json();
    }

    async function getCurrentPlayback() {

        return (await fetchWebApi(
            `v1/me/player`
        ))
    }
    let lastTrack = null


    async function updateUI(playback) {
        const track = playback.item;
        if (!track?.album?.images?.length) return;

        document.getElementById("title").textContent = track.name;
        document.getElementById("artist").textContent =
            track.artists.map(a => a.name).join(", ");

        const response = await fetch(track.album.images[0].url);
        const blob = await response.blob();

        const coverImg = document.getElementById("albumArt");
        const colorsHolder = document.getElementById("colorsHolder");

        const objectUrl = URL.createObjectURL(blob);
        let coverColors = []
        coverImg.onload = async () => {
            const palette = await Vibrant.from(coverImg).getPalette();

            colorsHolder.innerHTML = '';

            for (const name in palette) {
                const swatch = palette[name];

                if (swatch) {
                    const div = document.createElement('div');
                    div.style.width = '100px';
                    div.style.height = '100px';
                    div.style.backgroundColor = swatch.hex;
                    div.style.display = 'flex';
                    div.style.alignItems = 'center';
                    div.style.justifyContent = 'center';
                    div.style.fontSize = '10px';
                    div.style.color = '#fff';


                    div.innerText = name;

                    colorsHolder.appendChild(div);

                    const rgb = swatch ? swatch.rgb : [255, 255, 255];
                    const hex = enhanceColorForLED(
                        "#" +
                        rgb.map(v => Math.round(v).toString(16).padStart(2, "0")).join("")
                    );
                    coverColors.push(hex)
                }
            }

            URL.revokeObjectURL(objectUrl);


            const GAS_URL = "https://script.google.com/macros/s/AKfycbxg5qoFIIH8FNKCh6VXcs0Xvb0YemLNtmVX4AAnlANIJPh4YON_EcKDHDpQM7D3mOPe/exec"
            await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify({
                    colors: coverColors
                })

            })
        };

        coverImg.src = objectUrl;

    }

    function enhanceColorForLED(hex) {
        // ---------- Hex -> RGB ----------
        hex = hex.replace("#", "");

        let r = parseInt(hex.substring(0, 2), 16);
        let g = parseInt(hex.substring(2, 4), 16);
        let b = parseInt(hex.substring(4, 6), 16);

        // ---------- RGB -> HSV ----------
        let rn = r / 255;
        let gn = g / 255;
        let bn = b / 255;

        const max = Math.max(rn, gn, bn);
        const min = Math.min(rn, gn, bn);
        const delta = max - min;

        let h = 0;

        if (delta !== 0) {
            switch (max) {
                case rn:
                    h = ((gn - bn) / delta) % 6;
                    break;
                case gn:
                    h = (bn - rn) / delta + 2;
                    break;
                case bn:
                    h = (rn - gn) / delta + 4;
                    break;
            }

            h *= 60;
            if (h < 0) h += 360;
        }

        let s = max === 0 ? 0 : delta / max;
        let v = max;

        // ---------- Enhance ----------

        // More saturation
        s = Math.min(1, s * 1.25);

        // Tone down very bright colors
        if (v > 0.82) {
            v *= 0.88;
        }

        // Extra help for reds
        if (h < 25 || h > 335) {
            s = Math.min(1, s * 1.12);
            v *= 0.92;
        }

        // ---------- HSV -> RGB ----------

        const c = v * s;
        const x = c * (1 - Math.abs((h / 60) % 2 - 1));
        const m = v - c;

        let r1 = 0, g1 = 0, b1 = 0;

        if (h < 60) {
            r1 = c; g1 = x;
        } else if (h < 120) {
            r1 = x; g1 = c;
        } else if (h < 180) {
            g1 = c; b1 = x;
        } else if (h < 240) {
            g1 = x; b1 = c;
        } else if (h < 300) {
            r1 = x; b1 = c;
        } else {
            r1 = c; b1 = x;
        }

        r = Math.round((r1 + m) * 255);
        g = Math.round((g1 + m) * 255);
        b = Math.round((b1 + m) * 255);

        // ---------- Gamma correction ----------
        const gamma = 1.25;

        r = Math.round(Math.pow(r / 255, gamma) * 255);
        g = Math.round(Math.pow(g / 255, gamma) * 255);
        b = Math.round(Math.pow(b / 255, gamma) * 255);

        // ---------- RGB -> Hex ----------
        return "#" + [r, g, b]
            .map(v => v.toString(16).padStart(2, "0"))
            .join("");
    }

    async function refreshAccessToken() {
        const saved = JSON.parse(localStorage.getItem("spotify_token"));

        if (!saved?.refresh_token) {
            console.log("No refresh token available");
            return null;
        }

        const body = new URLSearchParams({
            grant_type: "refresh_token",
            refresh_token: saved.refresh_token,
            client_id: CLIENT_ID
        });

        const res = await fetch(
            "https://accounts.spotify.com/api/token",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded"
                },
                body
            }
        );

        const data = await res.json();

        if (!res.ok) {
            console.error("Refresh failed:", data);
            return null;
        }

        // Spotify may or may not return a new refresh token
        const newToken = {
            ...saved,
            access_token: data.access_token,
            expires_in: data.expires_in,
            token_type: data.token_type,
            scope: data.scope,
            expiresAt: Date.now() + data.expires_in * 1000
        };

        localStorage.setItem("spotify_token", JSON.stringify(newToken));

        token = newToken;

        console.log("Token refreshed");
        return newToken;
    }


    async function processToken() {
        document.getElementById("login").style.display = "none";
        const playback = await getCurrentPlayback();
        console.log(playback);
        updateUI(playback)
        let lastTrackId = null;

        setInterval(async () => {
            const playback = await getCurrentPlayback();
            if (!playback?.item) return;

            if (playback.item.id !== lastTrackId) {
                lastTrackId = playback.item.id;
                updateUI(playback);
            }
        }, 2000);

        setInterval(async () => {

            const timeLeft = token.expiresAt - Date.now();

            if (timeLeft < 60_000) {
                token = await refreshAccessToken();
            }
        }, 30_000);
    }

    if (saved) {
        token = JSON.parse(saved);
        await processToken()
    }



    document.getElementById("login").addEventListener("click", async () => {
        const codeVerifier = generateRandomString(64);

        sessionStorage.setItem("code_verifier", codeVerifier);
        const hashed = await sha256(codeVerifier);

        const codeChallenge = base64url(hashed);

        const params = new URLSearchParams({
            client_id: CLIENT_ID,
            response_type: "code",
            redirect_uri: REDIRECT_URI,
            code_challenge_method: "S256",
            code_challenge: codeChallenge,
            scope: SCOPES
        });

        window.location =
            "https://accounts.spotify.com/authorize?" +
            params.toString();
    })

    const code =
        new URLSearchParams(window.location.search)
            .get("code");


    if (code) {
        const verifier =
            sessionStorage.getItem("code_verifier");

        sessionStorage.removeItem("code_verifier");

        const body = new URLSearchParams({
            client_id: CLIENT_ID,
            grant_type: "authorization_code",
            code,
            redirect_uri: REDIRECT_URI,
            code_verifier: verifier
        });

        const response = await fetch(
            "https://accounts.spotify.com/api/token",
            {
                method: "POST",
                headers: {
                    "Content-Type":
                        "application/x-www-form-urlencoded"
                },
                body
            }
        );

        if (!response.ok) {
            console.error(await response.json());
        }

        token = await response.json();
        const expiresAt = Date.now() + token.expires_in * 1000;
        token.expiresAt = expiresAt
        localStorage.setItem(
            "spotify_token",
            JSON.stringify(token)
        );
        window.history.replaceState({}, document.title, REDIRECT_URI);
        await processToken()

    }


</script>
