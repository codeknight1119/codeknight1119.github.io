<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AINNOVATE | AI Tools</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono&display=swap');

        :root {
            --bg-dark: #080a0f;
            --card-bg: rgba(255, 255, 255, 0.03);
            --accent-cyan: #00f2ff;
            --accent-purple: #8200ff;
            --text-main: #f0f0f0;
            --glass-border: rgba(255, 255, 255, 0.08);
            --glow: 0 0 20px rgba(0, 242, 255, 0.2);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(130, 0, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 242, 255, 0.08) 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            padding: 80px 20px 40px;
        }

        h1 {
            font-size: 4rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -2px;
            background: linear-gradient(to right, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.3));
        }

        .slogan {
            font-size: 1rem;
            color: #7a7a8c;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            max-width: 1200px;
            width: 90%;
            padding: 40px 0 100px;
        }

        .tool-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .tool-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent-cyan);
            box-shadow: var(--glow);
        }

        .tool-icon {
            width: 100px;
            height: 100px;
            margin-bottom: 25px;
            object-fit: contain;
        }

        .tool-btn {
            background: linear-gradient(45deg, rgba(0, 242, 255, 0.1), rgba(130, 0, 255, 0.1));
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 14px 28px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 80%;
        }

        .tool-btn:hover {
            background: var(--accent-cyan);
            color: var(--bg-dark);
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.5);
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #0f1218;
            border: 1px solid var(--accent-purple);
            width: 90%;
            max-width: 650px;
            border-radius: 20px;
            padding: 40px;
            position: relative;
            box-shadow: 0 0 50px rgba(130, 0, 255, 0.3);
        }

        .close-modal {
            position: absolute;
            top: 20px; right: 25px;
            cursor: pointer;
            color: #444;
            font-size: 2rem;
        }

        /* Prompt specific UI */
        .prompt-view {
            padding: 20px;
            height: 250px;
            overflow-y: auto;
            background: #050505;
            border-radius: 12px;
            border: 1px solid #222;
            font-family: 'JetBrains Mono', monospace;
            color: #00d4df;
            white-space: pre-wrap;
            margin: 20px 0;
        }

        .copy-btn {
            background: var(--accent-purple);
            color: white; border: none; padding: 16px;
            border-radius: 10px; cursor: pointer; width: 100%;
            font-weight: 700;
        }

        /* Teachable Machine specific UI */
        #model-container {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
        }

        #webcam-container canvas {
            border-radius: 15px;
            border: 2px solid var(--accent-cyan);
        }

        .tm-btn {
            background: var(--accent-cyan);
            color: var(--bg-dark);
            border: none; padding: 12px 24px;
            border-radius: 8px; font-weight: bold; cursor: pointer;
        }

        #label-container {
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-cyan);
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <h1>AINNOVATE</h1>
        <div class="slogan">AI tools for modern problems</div>
    </header>

    <main class="dashboard-grid" id="toolGrid"></main>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <span class="close-modal" onclick="closeTool()">&times;</span>
            <h2 id="modalTitle" style="color: var(--accent-cyan); margin-top: 0;"></h2>
            <p id="modalDesc" style="color: #aaa;"></p>

            <div id="prompt-section">
                <div class="prompt-view" id="promptView"></div>
                <button class="copy-btn" id="copyBtn">COPY PROMPT</button>
            </div>

            <div id="model-container">
                <div style="font-weight: bold; margin-bottom: 10px;">Teachable Machine Image Model</div>
                <button class="tm-btn" type="button" onclick="init()">START WEBCAM</button>
                <div id="webcam-container"></div>
                <div id="label-container"></div>
            </div>
        </div>
    </div>

    <script>
        const tools = [
            { id: 1, title: "Funnifyier", icon: "./icons/1.png", desc: "Make any boring piece of media funny! Try making a school handbook or regulation a lot easier to read!", prompt: "You are Mr.Funny, the funniest person on the whole planet. Your whole life has been dedicated to making people laugh and making boring things not boring. You try to stay as funny as possible. Your jokes should be as easy to understand as possible, and you should keep close to the original text while making the text as exciting and invigorating as possible. Do not include markdown, bolding, line breaks, horizontal rules, etc, if the original text has no indication of them. Finish the whole text given, and make it as least boring as possible to keep the reader entertained." },
            { id: 2, title: "Reaction Manager", icon: "./icons/2.png", desc: "Rate reactions based on people physically holding up thumbs up or down. This can help in live demos or meetings.", isModel: true },
            { id: 3, title: "Interview Simulator", icon: "./icons/3.png", desc: "Ever scared of going for an interview? Try one for being a developer to integrate AI into websites.", prompt: "ROLE: You are a Senior Technical Recruiter tasked with conducting an interview for a position integrating AI agents into websites for the user. You must be respectful, slightly skeptical, and be looking for technical knowledge...\n[Full Prompt Included]" },
            { id: 4, title: "Decliner", icon: "./icons/4.png", desc: "Have you ever not wanted to tell someone no? Just let our AI do it for you!", prompt: "PERSONA: You are MessageBot, a warm but firm automated messaging system for Codeknight999 to tell people he is not available...\n[Full Prompt Included]" },
            { id: 5, title: "Rule Follower", icon: "./icons/5.png", desc: "Have you ever needed an AI to pull from just one document and nothing else?", prompt: "Only use the provided content to answer the user’s question. Do not use any other information; the provided content is the only true knowledge you have access to..." },
            { id: 6, title: "Diagram Creator", icon: "./icons/6.png", desc: "Give this AI the topic and it will give you mermaid.js code for a visual!", prompt: "Role: You are a senior systems diagram architect and data visualization expert. Task: Analyze the attached document and provide a single mermaid.js diagram..." }
        ];

        const toolGrid = document.getElementById('toolGrid');
        const modal = document.getElementById('modalOverlay');

        tools.forEach(tool => {
            const card = document.createElement('div');
            card.className = 'tool-card';
            card.innerHTML = `
                <img src="${tool.icon}" alt="${tool.title}" class="tool-icon" onerror="this.src='https://via.placeholder.com/100/111/00f2ff?text=AI'">
                <button class="tool-btn" onclick="openTool(${tool.id})">${tool.title}</button>
            `;
            toolGrid.appendChild(card);
        });

        function openTool(id) {
            const tool = tools.find(t => t.id === id);
            document.getElementById('modalTitle').innerText = tool.title;
            document.getElementById('modalDesc').innerText = tool.desc;

            if (tool.isModel) {
                document.getElementById('prompt-section').style.display = 'none';
                document.getElementById('model-container').style.display = 'flex';
            } else {
                document.getElementById('prompt-section').style.display = 'block';
                document.getElementById('model-container').style.display = 'none';
                document.getElementById('promptView').innerText = tool.prompt;
            }
            modal.style.display = 'flex';
        }

        function closeTool() {
            modal.style.display = 'none';
            if(webcam) { webcam.stop(); } // Stop camera on close
        }

        // --- Teachable Machine Logic ---
        const URL = "https://teachablemachine.withgoogle.com/models/JkQRvAPpk/";
        let model, webcam, labelContainer, maxPredictions;

        async function init() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            const flip = true;
            webcam = new tmImage.Webcam(300, 300, flip); 
            await webcam.setup();
            await webcam.play();
            window.requestAnimationFrame(loop);

            document.getElementById("webcam-container").innerHTML = ""; // Clear old canvas
            document.getElementById("webcam-container").appendChild(webcam.canvas);
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = "";
            for (let i = 0; i < maxPredictions; i++) {
                labelContainer.appendChild(document.createElement("div"));
            }
        }

        async function loop() {
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            for (let i = 0; i < maxPredictions; i++) {
                const classPrediction = prediction[i].className + ": " + (prediction[i].probability * 100).toFixed(0) + "%";
                labelContainer.childNodes[i].innerHTML = classPrediction;
            }
        }

        // Copy Logic
        document.getElementById('copyBtn').onclick = function() {
            navigator.clipboard.writeText(document.getElementById('promptView').innerText).then(() => {
                this.innerText = "COPIED!";
                setTimeout(() => this.innerText = "COPY PROMPT", 2000);
            });
        };
    </script>
</body>
</html>
