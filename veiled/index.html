<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veiled</title>
    <style>
        .header {
            padding: 60px;
            text-align: center;
            background: #000000;
            color: white;
            font-size: 30px;
        }

        .box {
            background: black;
            color: white;
            width: 300px;
            text-align: center;
            min-height: 100px;
            border-radius: 10px;

        }

        #countdown {
            display: flex;
            justify-content: center;
        }
    </style>
</head>

<body>
    <div id="header">
        <h1>Veiled</h1>
        <p>AROUND YOU</p>
    </div>
    <div id="countdown">
        <div class="box">
            <h3 id="countdown-days"></h3>
            <h3>DAYS</h3>
        </div>
        <div class="box">
            <h3 id="countdown-hours"></h3>
            <h3>HOURS</h3>
        </div>
        <div class="box">
            <h3 id="countdown-mins"></h3>
            <h3>MINUTES</h3>
        </div>
        <div class="box">
            <h3 id="countdown-secs"></h3>
            <h3>SECONDS</h3>
        </div>
    </div>
</body>
<script>
    var countDownDate = new Date("Aug 19, 2026 06:00:00").getTime();

    const firstLoad = false;
    // Update the count down every 1 second
    async function updateTime() {

        // Get today's date and time
        var now = new Date().getTime();

        // Find the distance between now and the count down date
        var distance = countDownDate - now;

        // Time calculations for days, hours, minutes and seconds
        var days = Math.floor(distance / (1000 * 60 * 60 * 24));
        var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        var seconds = Math.floor((distance % (1000 * 60)) / 1000);



        document.getElementById("countdown-day").innerText = days
        document.getElementById("countdown-hours").innerText = hours
        document.getElementById("countdown-mins").innerText = minutes
        document.getElementById("countdown-secs").innerText = seconds


        // If the count down is finished, write some text
        if (distance < 0) {
            clearInterval(x);
            document.getElementById("countdown").innerHTML = "OUT NOW";
            showLink()
        }
        if (firstLoad) {
            firstLoad = false;
            await dailyUpdate(days)
        }
    }
    updateTime()
    var x = setInterval(updateTime, 1000);
    async function showLink() {
        document.getElementById("countdown").hidden = true;
    }

</script>

</html>
