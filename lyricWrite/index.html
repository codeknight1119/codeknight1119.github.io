<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Web Page</title>

    <script src="./index.js" defer type="module"></script>

    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="pageEnter">
        <div class="header">
            <h2 id="pageTitle">LyricWrite</h2>
            <hr>
        </div>
        <div class="card">
            <h2 id="sectionTitle">Songs</h2>
            <ul class="sortable-list">
                <template id="songBtnTemplate">
                    <li class="sortable-item" draggable="true">
                        <div>
                            <p class="title"></p>
                            <button class="loadBtn">Work on song</button>
                        </div>
                    </li>
                </template>
            </ul>
            <button id="addSong">Add Song</button>
        </div>
    </div>
    <div id="songEdit">
        <div class="header">
             <h2 class="pageTitle"></h2>
            <hr>
        </div>
        <div id="songPartsHolder">

        </div>
    </div>

</body>

</html>
