<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Tavern - Login</title>
    <link rel="stylesheet" href="https://unpkg.com/papercss@1.9.2/dist/paper.min.css" />
    <style>
        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 15px
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>The Tavern Login</h1>
        </header>

        <main class="paper container">
            <div id="loginSignUp">
                <p>The WCHS D&D club hub is just a click away! Sign in and get verified by an Officer to join the fun!
                </p>
                <br>
                <button id="login">Login/Sign Up</button>
            </div>
            <div id="getVerified" hidden>
                <p>You are signed in but not verified, please tell an Officer to let you into the club!
                </p>
            </div>
        </main>

        <footer>
            <p>Made by Gabriel Christian (Codeknight999) for the WCHS D&D club.</p>
        </footer>
    </div>
    <script type="module">
        import * as FirebaseUtils from "./firebaseUtils.js"
        const loginSignUpEl = document.getElementById("loginSignUp")
        const getVerifiedEl = document.getElementById("getVerified")



        async function checkLogin() {
            const data = await FirebaseUtils.isSignedIn()
            console.log(data)
            handleLogin(data)
        }
        checkLogin()


        document.getElementById("login").addEventListener("click", async () => {
            const signIn = await FirebaseUtils.loginGoogle()
            await handleLogin(signIn)
        })

        function toggleVis() {
            loginSignUpEl.hidden = true;
            getVerifiedEl.hidden = false;
        }

        async function handleLogin(signIn) {
            try{
            if (signIn) {
                if (signIn.isNew) {
                    console.log("new account")
                    const data = {
                        name: signIn.user.displayName,
                        allowed: false,
                        role: "player",
                    }
                    await FirebaseUtils.setDocument(`users/${signIn.user.uid}`, data)
                    toggleVis()
                    return 
                }
                const userData = await FirebaseUtils.getDocument(`users/${signIn.user.uid}`)
                if(!userData || ! userData.allowed){
                    toggleVis()
                    return
                }else{
                    window.location.href = "https://codeknight1119.github.io/The%20Tavern/main"
                }

            }
        }catch(e){
            console.error("login error: ", e)
        }
        }
    </script>
</body>

</html>
