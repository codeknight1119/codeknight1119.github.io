<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulse Wiki</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="./style.css" />
    <link rel="icon" type="image/png" href="resources/pulseSymbol.png" />
</head>

<body>
    <header id="header">
        <h1 id="title"></h1>
        <h4>v.30</h4>
        <button id="login">Login</button>
    </header>
    <div id="loginPopup">
        <h3>Login</h3>
        <p>If you are in a D&D campaign <strong>YOU MUST SIGN UP</strong> and select the correct campaign</p>
        <p>If you are not in a campaign, there is need to log in, if you do you can save popups and bookmarks.</p>
        <button id="logiBttn">Login with Google</button>
        <div id="chooseUseCase">
            <label for="choose">Choose your usecase</label>
            <select name="choose">
                <option value="none">Not in a campaign</option>
                <option value="DND:UP">D&D: Ultimate Pulse</option>
                <option value="DND:RP">D&D: Revitalized Pulse</option>
            </select>
            <button id="selectuseCase">Select</button>
        </div>
        <button id="loginExit">Exit</button>
    </div>

    <main id="main-container" role="main" aria-labelledby="title"></main>

    <button id="back-btn" onclick="backPage()">Back</button>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="module" src="./app.js"></script>
</body>

</html>
