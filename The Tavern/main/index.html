<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Tavern</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/rpg-awesome/0.2.0/css/rpg-awesome.min.css">
    <link rel="stylesheet" href="./style.css">
    <script type="module" src="./app.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght=400..900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
</head>

<body>
    <div id="findFriends-popup" hidden>
        <h2>Find your friends</h2>
        <br><br>
        <div style="display: flex;">
            <pre>Search by: </pre>
            <select id="findFriends-searchByDropdown">
                <option val="UN" selected>User Name</option>
                <option val="RN" selected>Real Name</option>
            </select>
        </div>
        <div id="findFriends-selectedFriends"> </div>
    </div>
    <nav id="sidebar">
        <ul>
            <li>
                <button id="toggle-btn">
                    <i class="ra ra-broadhead-arrow"></i>
                </button>
            </li>
        </ul>
        <ul>
            <template id="sidebarTemplate">
                <li>
                    <a class="nav-btn">
                        <i class="ra ra-2x"></i>
                        <span class="sidebarText"></span>
                    </a>
                </li>
            </template>

            <li>
                <button class="dropdown-btn">
                    <i class="ra ra-2x ra-beer"></i>
                    <span>All Patrons</span>
                    <i class="ra ra-broadhead-arrow"></i>
                </button>
                <div class="sub-menu">
                    <ul id="everySidebarParent">
                    </ul>
                </div>
            </li>

            <li>
                <button class="dropdown-btn">
                    <i class="ra ra-2x ra-player"></i>
                    <span>My Pack</span>
                    <i class="ra ra-broadhead-arrow"></i>
                </button>
                <div class="sub-menu">
                    <ul id="personal-menu">
                    </ul>
                </div>
            </li>

            <li>
                <button class="dropdown-btn">
                    <i class="ra ra-2x ra-double-team"></i>
                    <span>Private Chats</span>
                    <i class="ra ra-broadhead-arrow"></i>
                </button>
                <div class="sub-menu">
                    <ul id="private-chat-list">
                        <li id="find-friends-li">
                            <a class="nav-btn" id="findFriends-btn" data-id="find-friends">
                                <i class="ra ra-2x ra-aware"></i>
                                <span class="sidebarText">Find Friends</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </li>
        </ul>
    </nav>
    <main>
        <header>
            <h1 class="cinzel-title">The Tavern</h1>
        </header>
        <div id="mainContentArea">

        </div>
        <div id="chatTools" hidden class="featureHTML">
            <div id="sendBar"></div><button id="sendBtn"><i class="ra ra-2x ra-spear-head"></i></button>
        </div>
        <div id="userPermsUI" hidden class="featureHTML">
            <p id="helpTextUserPerms"><strong>Select a filter or enter a search and press the find button to
                    begin</strong></p>
            <div id="userSearchFilters">
                <label for="filterDropdown">Choose a filter</label>
                <select name="filterDropdown" id="filterDropdown">
                    <option value="searchName">Search by name</option>
                    <option value="notAllowed">Not allowed users (recent signups)</option>
                </select>

            </div>
            <button id="userSearchBttn">Find Users</button>
            <input type="text" id="searchTermIn" />
            <template id="userSearchTemplate">
                <div style="display: flex;">
                    <pre><strong>Name: </strong></pre>
                    <p class="searched-Name"></p>
                    <pre> | </pre>
                    <pre><strong> Allowed:  </strong></pre>
                    <select class="searched-allowed">
                        <option value="false">False</option>
                        <option value="true">True</option>
                    </select>
                    <pre> | </pre>
                    <pre><strong>Roles:  </strong></pre>
                    <p class="searched-roles"></p>
                    <p> | </p>
                    <button class="searched-addRole-btn">Add Role</button><button class="searched-revokeRole-btn">Revoke
                        Role</button> <select class="searched-addRole-val">
                        <option value="dm">DM</option>
                        <option value="officer">Officer</option>
                    </select>
                    <p> | </p> <button class="searched-save">Save Changes</button>
                </div>
            </template>
        </div>
        <template id="board-template">
            <div class="board-parent">
                <section class='boardMessage'>
                    <h3 class="cinzel-title board-title"></h3>
                    <p class="board-body"></p>
                    <button class="board-delete" hidden>Delete</button>
                </section>
            </div>
        </template>
        <div style="display: flex; justify-content: center;">
            <button id="board-new" hidden>Create a new board.</button>
        </div>
        <div id="campaignUI" hidden>
            <div id="campaign-left">
                <p>Main text</p>
                <button id="campaign-enterSplitscreen">Toggle split screen</button>
            </div>
            <div id="campaign-splitScreenDivide" hidden></div>
            <div id="campaign-right" hidden>
                <p>Right side text</p>
            </div>
        </div>

    </main>
</body>

</html>
