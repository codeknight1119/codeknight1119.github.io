name: Deploy OOTOA

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'Deploy OOTOA')"

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: OOTOA/package-lock.json

    - name: Install dependencies
      run: |
        cd OOTOA
        npm ci

    - name: Build
      run: |
        cd OOTOA
        npm run build

    - name: Deploy to subfolder
      run: |
        cd OOTOA
        cp -r dist/* .
        rm -rf dist

    - name: Commit and push
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add OOTOA/
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Deploy OOTOA"
          git push
        fi