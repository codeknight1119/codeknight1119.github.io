<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <meta name="color-scheme" content="light dark">
    <link rel="icon" type="image/x-icon" href="freeAILogo.svg">

    <style>
        #mainChat {
            overflow-y: scroll;
            margin-bottom: 20px;
            max-height: 60vh;
        }

        #title {
            display: flex;
            justify-content: center;
        }

        #sendMessageUI {
            display: flex;
            flex-direction: row;
            gap: 10px;
        }

        /* Sidebar container styling */
        .sidebar {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 2;
            /* Put above main content */
            top: 0;
            left: 0;
            background-color: #111;
            overflow-x: hidden;
            padding-top: 60px;
            transition: 0.5s;
        }

        /* Sidebar links & conversation items */
        .sidebar a {
            padding: 8px 8px 8px 32px;
            text-decoration: none;
            font-size: 18px;
            color: #818181;
            display: block;
            transition: 0.3s;
        }

        .sidebar a:hover {
            color: #f1f1f1;
        }

        /* Position and style the close button */
        .sidebar .closebtn {
            position: absolute;
            top: 0;
            right: 25px;
            font-size: 36px;
            margin-left: 50px;
        }

        /* New Conversation Button Styling */
        .new-conv-btn {
            margin: 0 20px 20px 32px;
            width: calc(100% - 52px);
            background-color: #232323;
            border: 1px solid #444;
            color: #fff;
            padding: 8px;
            font-size: 14px;
            cursor: pointer;
        }

        .new-conv-btn:hover {
            background-color: #333;
        }

        #main {
            transition: margin-left .5s;
            padding: 20px;
        }

        @media screen and (max-height: 450px) {
            .sidebar {
                padding-top: 15px;
            }

            .sidebar a {
                font-size: 16px;
            }
        }

        #openBttn {
            font-size: 50px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 10px;
            color: inherit;
        }
    </style>
    <title>AI on a Student Budget</title>
</head>

<body>
    <header>
        <button id="openBttn">&#9776;</button>
        <h1 id="title">AI on a Student Budget</h1>
        <hr />
    </header>
    

    <main class="container">
        <div id="main">
            <div id="sideBar" class="sidebar">
                <a href="javascript:void(0)" id="closeBttn" class="closebtn">&times;</a>
                <button id="newConvBttn" class="new-conv-btn">+ New Conversation</button>
                <hr style="border-color: #222; margin: 0 0 15px 0;" />
                <div id="conversationsList"></div>
            </div>



            <div id="mainChat"></div>

            <div id="UIBar">
                <div id="sendMessageUI">
                    <input id="textEnter" placeholder="Type a message..." />
                    <button id="sendButton">Send</button>
                </div>
            </div>
            <button id="login" style="margin-top: 20px;">Login</button>
        </div>
    </main>

</body>

<script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
<script type="module">
    import * as FirebaseUtils from './firebaseUtils.js';

    // Global accessibility adjustments
    window.openNav = openNav;
    window.closeNav = closeNav;
    window.createNewConversation = createNewConversation;

    document.getElementById("openBttn").addEventListener("click", openNav);
    document.getElementById("closeBttn").addEventListener("click", closeNav);
    document.getElementById("newConvBttn").addEventListener("click", createNewConversation);

    // Variables section
    let sysPrompt = "";
    let isReady = false;
    let currentConversationId = null;
    let messages = [];
    let convs = new Map();

    async function init() {
        const data = await FirebaseUtils.isSignedIn();

        if (!data) {
            window.location.href = "https://codeknight1119.github.io/freeAI/";
            return;
        }

        const allowedUsers = await FirebaseUtils.getDocument("/system/allowedUsers");

        if (!allowedUsers || !allowedUsers.users.includes(data.uid)) {
            window.location.href = "https://codeknight1119.github.io/freeAI/";
        }
    }
    init();

    const textIn = document.getElementById("textEnter");
    const messageArea = document.getElementById("mainChat");
    document.getElementById("sendButton").addEventListener("click", queryModel);

    async function getSysPrompt() {
        try {
            const data = await FirebaseUtils.getDocument("/system/systemPrompt");
            sysPrompt = data.prompt || "You are an AI to help a user with daily tasks.";
        } catch (e) {
            sysPrompt = "You are an AI to help a user with daily tasks.";
            await FirebaseUtils.setDoc("/system/systemPrompt", { prompt: sysPrompt });
        }
        messages.push({ "role": "system", "content": sysPrompt });
        getConversations();
    }

    async function getConversations() {
        const convData = await FirebaseUtils.getDocuments("/conversations", 15, { field: "timestamp", direction: "desc" });
        const container = document.getElementById("conversationsList");
        container.innerHTML = "";

        if (convData && convData.length !== 0) {
            convData.forEach((val) => {
                convs.set(val.id, val);

                let convLink = document.createElement("a");
                convLink.href = "javascript:void(0)";
                convLink.innerText = val.title || "Chat " + val.id.substring(0, 6);
                convLink.onclick = () => loadConversation(val.id);

                container.appendChild(convLink);
            });
        } else {
            let emptyNotice = document.createElement("p");
            emptyNotice.style = "color: #555; padding-left: 32px; font-size: 14px;";
            emptyNotice.innerText = "No conversations, try making one!";
            container.appendChild(emptyNotice);
        }
        isReady = true;
    }

    getSysPrompt();

    async function queryModel() {
        if (!isReady) {
            setTimeout(queryModel, 500);
            return;
        }
        try {
            const query = textIn.value;
            if (!query.trim()) return;

            if (currentConversationId === null) {
                const newConv = await FirebaseUtils.addDocument("/conversations", { title: "Generating title...", timestamp: new Date().getTime() });
                currentConversationId = newConv.id;
                // PATCH: Pass the query string directly so it can create a title summary immediately
                setUpConv(currentConversationId, query);
            }

            textIn.value = "";
            let userMessageElement = document.createElement("p");
            userMessageElement.innerHTML = "<strong>USER:</strong> " + query;
            messageArea.appendChild(userMessageElement);

            const userMessage = { "role": "user", "content": query };
            messages.push(userMessage);
            await FirebaseUtils.addDocument(`conversations/${currentConversationId}/messages`, userMessage);

            const receive = await queryGas("conversation", { messages: messages });
            const receivedMessage = receive.choices[0].message.content;

            let aiMessageElement = document.createElement("p");
            aiMessageElement.innerHTML = marked.parse("**MODEL:** " + receivedMessage);

            const aiMessage = { "role": "assistant", "content": receivedMessage };
            messages.push(aiMessage);
            await FirebaseUtils.addDocument(`conversations/${currentConversationId}/messages`, aiMessage);
            messageArea.appendChild(aiMessageElement);

            // Auto-scroll chat area
            messageArea.scrollTop = messageArea.scrollHeight;
        } catch (e) {
            console.error(e);
        }
    }

    function openNav() {
        document.getElementById("sideBar").style.width = "250px";
        document.getElementById("main").style.marginLeft = "250px";
    }

    function closeNav() {
        document.getElementById("sideBar").style.width = "0";
        document.getElementById("main").style.marginLeft = "0";
    }

    function createNewConversation() {
        messageArea.innerHTML = "";
        messages = [{ "role": "system", "content": sysPrompt }];
        currentConversationId = null; // Clean slate state
        closeNav();
    }

    // PATCH: Rewritten to properly track IDs and load historic messages
    async function loadConversation(id) {
        messageArea.innerHTML = "<p>Loading history...</p>";
        closeNav();

        currentConversationId = id;
        messages = [{ "role": "system", "content": sysPrompt }];

        try {
            // Read subcollection paths sequentially
            const history = await FirebaseUtils.getDocuments(`conversations/${id}/messages`, 50);
            messageArea.innerHTML = "";

            if (history && history.length > 0) {
                history.forEach((msg) => {
                    messages.push({ role: msg.role, content: msg.content });
                    let msgDoc = document.createElement("p");
                    if (msg.role === "user") {
                        msgDoc.innerHTML = "<strong>USER:</strong> " + msg.content;
                    } else {
                        msgDoc.innerHTML = marked.parse("**MODEL:** " + msg.content);
                    }
                    messageArea.appendChild(msgDoc);
                });
                messageArea.scrollTop = messageArea.scrollHeight;
            }
        } catch (e) {
            console.error("Error reading chat history: ", e);
            messageArea.innerHTML = "<p>Could not load history.</p>";
        }
    }

    // PATCH: Rewritten to process incoming prompt text and save summary back to Firestore
    async function setUpConv(id, firstPromptText) {
        try {
            const params = {
                inputs: firstPromptText,
                parameters: {
                    max_length: 25,
                    min_length: 5,
                    do_sample: false
                }
            };
            const data = await queryGas("convName", params);
            console.log(data)
            // Assuming your endpoint outputs summary_text or similar properties
            const titleText = (data && data.summary_text) ? data.summary_text : firstPromptText.substring(0, 20) + "...";

            // Save title directly back to the document root reference
            await FirebaseUtils.updateDocument(`/conversations/${id}`, { title: titleText });
            getConversations(); // Refresh history sidebar UI
        } catch (err) {
            console.error("Failed to generate custom title summary: ", err);
        }
    }

    async function queryGas(task, body) {
        const GAS_LINK = "https://script.google.com/macros/s/AKfycbxP7iY6NmbLfCtEy4C4eRAY7OtgTvmoy_UEmPgz-JLF6hJAWEjg0VIxaVq8n4nDK-Nk/exec"
        const data = await fetch(GAS_LINK, {
            method: "POST",
            body: JSON.stringify({ task: task, params: body }),
        });
        const receive = await data.json();
        return receive;
    }
</script>

</html>
