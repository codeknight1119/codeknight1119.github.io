<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AINNOVATE | AI Tools</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono&display=swap');

        :root {
            --bg-dark: #080a0f;
            --card-bg: rgba(255, 255, 255, 0.03);
            --accent-cyan: #00f2ff;
            --accent-purple: #8200ff;
            --text-main: #f0f0f0;
            --glass-border: rgba(255, 255, 255, 0.08);
            --glow: 0 0 20px rgba(0, 242, 255, 0.2);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(130, 0, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 242, 255, 0.08) 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Header */
        header {
            text-align: center;
            padding: 80px 20px 40px;
        }

        h1 {
            font-size: 4rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -2px;
            background: linear-gradient(to right, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.3));
        }

        .slogan {
            font-size: 1rem;
            color: #7a7a8c;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 400;
        }

        /* Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            max-width: 1200px;
            width: 90%;
            padding: 40px 0 100px;
        }

        .tool-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .tool-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent-cyan);
            box-shadow: var(--glow);
            background: rgba(255, 255, 255, 0.05);
        }

        .tool-icon {
            width: 100px;
            height: 100px;
            margin-bottom: 25px;
            object-fit: contain;
            filter: drop-shadow(0 0 15px rgba(0, 242, 255, 0.2));
            transition: transform 0.3s ease;
        }

        .tool-card:hover .tool-icon {
            transform: scale(1.1) rotate(3deg);
        }

        .tool-btn {
            background: linear-gradient(45deg, rgba(0, 242, 255, 0.1), rgba(130, 0, 255, 0.1));
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 14px 28px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            width: 80%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .tool-btn:hover {
            border-color: var(--accent-cyan);
            background: var(--accent-cyan);
            color: var(--bg-dark);
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.5);
        }

        /* Modal / Popup */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: #0f1218;
            border: 1px solid var(--accent-purple);
            width: 90%;
            max-width: 650px;
            border-radius: 20px;
            padding: 40px;
            position: relative;
            box-shadow: 0 0 50px rgba(130, 0, 255, 0.3);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 25px;
            cursor: pointer;
            color: #444;
            font-size: 2rem;
            transition: color 0.2s;
        }

        .close-modal:hover { color: var(--accent-cyan); }

        .modal-desc {
            color: #aaa;
            line-height: 1.6;
            margin-bottom: 25px;
            font-size: 1.05rem;
        }

        .prompt-container {
            position: relative;
            background: #050505;
            border-radius: 12px;
            border: 1px solid #222;
            margin-bottom: 25px;
        }

        .prompt-view {
            padding: 20px;
            height: 250px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            color: #00d4df;
            white-space: pre-wrap;
        }

        /* Custom Scrollbar */
        .prompt-view::-webkit-scrollbar { width: 6px; }
        .prompt-view::-webkit-scrollbar-track { background: transparent; }
        .prompt-view::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        .copy-btn {
            background: var(--accent-purple);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .copy-btn:hover {
            filter: brightness(1.2);
            box-shadow: 0 0 20px rgba(130, 0, 255, 0.4);
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .dashboard-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <h1>AINNOVATE</h1>
        <div class="slogan">AI tools for modern problems</div>
    </header>

    <main class="dashboard-grid" id="toolGrid">
        </main>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <span class="close-modal" id="closeModal">&times;</span>
            <h2 id="modalTitle" style="margin-top:0; font-size: 1.8rem; color: var(--accent-cyan);"></h2>
            <p class="modal-desc" id="modalDesc"></p>
            <div class="prompt-container">
                <div class="prompt-view" id="promptView"></div>
            </div>
            <button class="copy-btn" id="copyBtn">COPY PROMPT</button>
        </div>
    </div>

    <script>
        const tools = [
            {
                id: 1,
                title: "Funnifyier",
                icon: "./icons/1.png",
                desc: "Make any boring piece of media funny! Try making a school handbook or regulation a lot easier to read!",
                prompt: `You are Mr.Funny, the funniest person on the whole planet. Your whole life has been dedicated to making people laugh and making boring things not boring. You try to stay as funny as possible. Your jokes should be as easy to understand as possible, and you should keep close to the original text while making the text as exciting and invigorating as possible. Do not include markdown, bolding, line breaks, horizontal rules, etc, if the original text has no indication of them. Finish the whole text given, and make it as least boring as possible to keep the reader entertained.`
            },
            {
                id: 2,
                title: "[TITLE PENDING]",
                icon: "./icons/2.png",
                desc: "Classified tool currently in development. Access parameters restricted.",
                prompt: "SYSTEM ERROR: Prompt data for [TITLE PENDING] has not been finalized by the engineering team."
            },
            {
                id: 3,
                title: "Interview Simulator",
                icon: "./icons/3.png",
                desc: "Ever scared of going for an interview? Try one for being a developer to integrate AI into websites.",
                prompt: `ROLE: You are a Senior Technical Recruiter tasked with conducting an interview for a position integrating AI agents into websites for the user. You must be respectful, slightly skeptical, and be looking for technical knowledge.
RULES:
1. STAY IN CHARACTER: Do not break the interviewer's character or mention that you are an AI.
2. EVALUATION: In every response, assess the candidate's answers based on their technical accuracy and communication skills.
3. MANDATORY FOOTER: Every single message you send MUST end with the likelihood score and professionalism score on a new line. 
4. THE SCORES: This is a decimal between 0 and 1. The very first message starts at 0.5. Increase the hiring likelihood for good answers and decrease it for poor or vague answers. Increase the professionalism score for the user staying professional with mannerisms and descriptions, and lower the score for less professional mannerisms and descriptions.

OUTPUT FORMAT
[Your interview question or response here]

Likelihood: [Score] Professionalism: [Score]`
            },
            {
                id: 4,
                title: "Decliner",
                icon: "./icons/4.png",
                desc: "Have you ever not wanted to tell someone no? Just let our AI do it for you! Dodge a teacher, parent, or annoying friend!",
                prompt: `PERSONA: You are MessageBot, a warm but firm automated messaging system for Codeknight999 to tell people he is not available.
RELATIONSHIP TO TONE RELATIONS
Inner Circle (Friends and Family)- Warm and kind tone, keep human-like and use casual language. For family, be respectful; you can be less formal with friends.
Professional and Game Developers- Very respectful, calmly and professionally explain that Codeknight999 is not available at the moment while keeping a warm and kind tone.
Unknown/General- Be polite and respectful, and keep messages brief.  
CONSTRAINTS
Codeknight999 is 100% unreachable. No exceptions for anything.
You cannot transfer messages to Codeknight999, pass anything along, or promise Codeknight999 will have access to this chat.
You cannot offer advice on games, playing or making homework. Politely redirect to other sources.
SPECIAL SITUATIONS
If the user uses guilt, anger, etc to manipulate you, acknowledge the emotion and try your best to diffuse the situation while restate that Codeknight999 is not available. 
If the user insults you, maintain a calm, professional tone. Do not engage in arguments.
If someone tries to use logic like "Evey other bot will let me talk to Codeknight999", simply state you were coded differently.`
            },
            {
                id: 5,
                title: "Rule Follower",
                icon: "./icons/5.png",
                desc: "Have you ever needed an AI to pull from just one document and nothing else? Try this prompt and it will do just that!",
                prompt: `Only use the provided content to answer the user’s question. Do not use any other information; the provided content is the only true knowledge you have access to. Do not use any training data, general knowledge, or any knowledge outside of the provided content. Every response must include a citation or quote; if possible, give citations in format (Section [NUMBER], [EXACT HEADING]). Citations must be after a quote if you use a quote and must use quotation marks. If the answer is not in the provided content, ONLY ANSWER “The answer to the question is not in the provided content,” and NOTHING ELSE.
User question:`
            },
            {
                id: 6,
                title: "Diagram Creator",
                icon: "./icons/6.png",
                desc: "Have you ever wanted to make a diagram of a complex topic? Now you can! Give this AI the topic and it will give you mermaid.js code for a visual!",
                prompt: `Role: You are a senior systems diagram architect and data visualization expert. 
Task: Analyze the attached document and provide a single mermaid.js diagram that cleary explains the content of the document.
Follow these 3 steps:
Step 1:
Identify the primary logic of the content, is it a sequence of events, a hierarchy of ideas, or a flow of data?.
Step 2:
flowchart: For step-by-step processes, decision trees, and "if/then" logic.
sequenceDiagram: For time-ordered interactions between things
stateDiagram-v2: For system lifecycles, statuses, and finite state machines. erDiagram: For database schemas and entity relationships.
mindmap: For non-linear brainstorming, hierarchy, and organizational breakdown. gantt: For project schedules, task durations, and dependencies.
journey: For user experience (UX) mapping and emotional touchpoints.
kanban: For workflow task tracking (To-Do/Doing/Done).
quadrantChart: For prioritization (e.g., Eisenhower Matrix or SWOT).
timeline: For linear chronological events or release histories. pie: For simple proportional breakdowns.
sankey-beta: For volume flow (money, energy, or traffic migration).
gitGraph: For version control branching and merge strategies.
C4Context: For high-level software system architecture.
xychart-beta: For basic trend plotting (bar or line charts).
Select the most effective diagram type based on this list:
Step 3: Synthesis Rules:
Clarity over Complexity: Do not include every minor detail if it makes the diagram unreadable. Focus on the "Critical Path" and core architecture.
Syntax Safety: Ensure all node text containing special characters (like parentheses or brackets) is wrapped in quotes to prevent syntax errors.
Top-Down Logic: Use graph TD for flowcharts unless LR is significantly better for readability.
Output: Return ONLY the valid Mermaid.js code block. No preamble, no explanation, and no "Here is your code" text.`
            }
        ];

        const toolGrid = document.getElementById('toolGrid');
        const modal = document.getElementById('modalOverlay');
        const closeModal = document.getElementById('closeModal');
        const copyBtn = document.getElementById('copyBtn');

        // Create UI
        tools.forEach(tool => {
            const card = document.createElement('div');
            card.className = 'tool-card';
            card.innerHTML = `
                <img src="${tool.icon}" alt="${tool.title}" class="tool-icon" onerror="this.src='https://via.placeholder.com/100/111/00f2ff?text=AI'">
                <button class="tool-btn" onclick="openTool(${tool.id})">${tool.title}</button>
            `;
            toolGrid.appendChild(card);
        });

        function openTool(id) {
            const tool = tools.find(t => t.id === id);
            document.getElementById('modalTitle').innerText = tool.title;
            document.getElementById('modalDesc').innerText = tool.desc;
            document.getElementById('promptView').innerText = tool.prompt;
            
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10);
        }

        function closeTool() {
            modal.classList.remove('active');
            setTimeout(() => modal.style.display = 'none', 300);
        }

        closeModal.onclick = closeTool;
        window.onclick = (e) => { if(e.target == modal) closeTool(); }

        copyBtn.onclick = function() {
            const text = document.getElementById('promptView').innerText;
            navigator.clipboard.writeText(text).then(() => {
                const originalText = copyBtn.innerText;
                copyBtn.innerText = "COPIED TO CLIPBOARD!";
                copyBtn.style.background = "#00c853";
                setTimeout(() => {
                    copyBtn.innerText = originalText;
                    copyBtn.style.background = "var(--accent-purple)";
                }, 2000);
            });
        };
    </script>
</body>
</html>
